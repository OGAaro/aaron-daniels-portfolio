<svg width="100%" viewBox="0 0 680 720" xmlns="http://www.w3.org/2000/svg" style="font-family: 'Space Grotesk', system-ui, -apple-system, sans-serif;">
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<!-- Diagram backdrop -->
<rect x="0" y="0" width="680" height="720" fill="#1E1715"/>

<!-- ═══════════════════════════════════════════
     Research website container (dashed) — wraps visitor + agent + outcome
     Knowledge sources sit OUTSIDE since they're separate Microsoft services
     ═══════════════════════════════════════════ -->
<text x="40" y="40" font-size="11" font-weight="500" letter-spacing="0.05em" fill="#7A6F5C">DEPLOYMENT ENVIRONMENT</text>

<!-- Website container -->
<rect x="40" y="60" width="380" height="500" rx="16" fill="none" stroke="#5C5247" stroke-width="1" stroke-dasharray="6 4"/>
<text x="60" y="86" font-size="11" font-weight="500" letter-spacing="0.08em" fill="#7A6F5C">INSTITUTION RESEARCH WEBSITE</text>

<!-- ═══════════════════════════════════════════
     1. Research community visitors (top, inside website) — mint-sage
     ═══════════════════════════════════════════ -->
<g>
<rect x="80" y="110" width="300" height="80" rx="8" fill="#2D3530" stroke="#8AA88E" stroke-width="0.75"/>
<text x="230" y="134" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#D8E5DA">Research Community</text>
<text x="230" y="158" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#9AB89E">Visitors to the public research site</text>
<text x="230" y="176" text-anchor="middle" dominant-baseline="central" font-size="10" font-style="italic" fill="#7A8A65">researchers · students · sponsors · public</text>
</g>

<!-- Arrow: visitor → agent (with "opens chat widget" label) -->
<line x1="230" y1="190" x2="230" y2="252" stroke="#7A6F5C" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="240" y="221" dominant-baseline="central" font-size="10" font-style="italic" fill="#A89484">opens chat widget</text>

<!-- ═══════════════════════════════════════════
     2. Chatbot Agent (center, inside website) — deep crimson (centerpiece)
     ═══════════════════════════════════════════ -->
<g>
<rect x="80" y="254" width="300" height="130" rx="10" fill="#3D1E1E" stroke="#A03333" stroke-width="1"/>
<text x="230" y="282" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="500" letter-spacing="0.12em" fill="#A03333">AI AGENT</text>
<text x="230" y="310" text-anchor="middle" dominant-baseline="central" font-size="16" font-weight="700" fill="#F5DCDC">Research Chatbot</text>
<text x="230" y="332" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#C9A8A8">Built in Microsoft Copilot Studio</text>
<line x1="120" y1="350" x2="340" y2="350" stroke="#5C2A2A" stroke-width="0.5"/>
<text x="230" y="364" text-anchor="middle" dominant-baseline="central" font-size="10" font-style="italic" fill="#A89484">floating widget · bottom-right of page</text>
</g>

<!-- Arrow: agent → response (single outcome path, no triage split) -->
<line x1="230" y1="384" x2="230" y2="438" stroke="#7A6F5C" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="240" y="411" dominant-baseline="central" font-size="10" font-style="italic" fill="#A89484">delivers response</text>

<!-- ═══════════════════════════════════════════
     3. Response/Resource delivery (bottom inside website) — olive-sage (positive outcome)
     ═══════════════════════════════════════════ -->
<g>
<rect x="80" y="440" width="300" height="100" rx="8" fill="#2A3528" stroke="#7A8A65" stroke-width="0.75"/>
<text x="230" y="464" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="600" fill="#DCE5D2">Resources Delivered Inline</text>
<line x1="120" y1="482" x2="340" y2="482" stroke="#3D5040" stroke-width="0.5"/>
<text x="230" y="498" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#A8B89A">Policy guidance · how-to articles</text>
<text x="230" y="514" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#A8B89A">Resource lookups · referrals</text>
<text x="230" y="530" text-anchor="middle" dominant-baseline="central" font-size="10" font-style="italic" fill="#7A8A65">all without leaving the page</text>
</g>

<!-- ═══════════════════════════════════════════
     KNOWLEDGE SOURCES — two parallel boxes on the right, OUTSIDE website
     ═══════════════════════════════════════════ -->
<text x="445" y="240" font-size="11" font-weight="500" letter-spacing="0.05em" fill="#7A6F5C">KNOWLEDGE SOURCES</text>

<!-- Source 1: SharePoint knowledge base — bone/amber -->
<g>
<rect x="445" y="258" width="195" height="100" rx="8" fill="#3D3324" stroke="#B89A65" stroke-width="0.75"/>
<text x="542" y="280" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="600" fill="#F0E4CC">SharePoint</text>
<text x="542" y="298" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#C9B896">Knowledge Base</text>
<line x1="465" y1="316" x2="620" y2="316" stroke="#6B5C40" stroke-width="0.5"/>
<text x="542" y="332" text-anchor="middle" dominant-baseline="central" font-size="10" font-style="italic" fill="#B89A65">Organized by type</text>
<text x="542" y="346" text-anchor="middle" dominant-baseline="central" font-size="10" font-style="italic" fill="#B89A65">&amp; research area</text>
</g>

<!-- Source 2: Research web pages — dusty rose -->
<g>
<rect x="445" y="368" width="195" height="100" rx="8" fill="#3A2832" stroke="#6B4858" stroke-width="0.75"/>
<text x="542" y="390" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="600" fill="#E8D4DC">Research Web Pages</text>
<text x="542" y="408" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#B89AA5">Domain-wide content</text>
<line x1="465" y1="426" x2="620" y2="426" stroke="#5A3D4D" stroke-width="0.5"/>
<text x="542" y="442" text-anchor="middle" dominant-baseline="central" font-size="10" font-style="italic" fill="#9D8090">Auto-scanned for</text>
<text x="542" y="456" text-anchor="middle" dominant-baseline="central" font-size="10" font-style="italic" fill="#9D8090">relevant information</text>
</g>

<!-- ═══════════════════════════════════════════
     Bidirectional grounding arrows — agent ↔ both knowledge sources
     ═══════════════════════════════════════════ -->

<!-- Agent ↔ SharePoint (upper) -->
<line x1="380" y1="295" x2="443" y2="305" stroke="#7A6F5C" stroke-width="1.5" marker-end="url(#arrow)" marker-start="url(#arrow)"/>

<!-- Agent ↔ Research Pages (lower) -->
<line x1="380" y1="345" x2="443" y2="410" stroke="#7A6F5C" stroke-width="1.5" marker-end="url(#arrow)" marker-start="url(#arrow)"/>

<!-- Single "grounds on" label between arrows -->
<text x="412" y="370" text-anchor="middle" dominant-baseline="central" font-size="9" font-style="italic" fill="#A89484" transform="rotate(-15 412 370)">grounds on</text>

<!-- ═══════════════════════════════════════════
     IMPACT callout — full-width strip at bottom
     Uses the same gold-bordered styling as the project panel impact callout
     ═══════════════════════════════════════════ -->
<g>
<rect x="40" y="600" width="600" height="80" rx="8" fill="rgba(212,184,134,0.08)" stroke="#D4B886" stroke-width="0.75"/>
<rect x="40" y="600" width="3" height="80" fill="#D4B886"/>
<text x="60" y="625" font-size="11" font-weight="500" letter-spacing="0.12em" fill="#D4B886">📈  MEASURED IMPACT</text>
<text x="60" y="652" font-size="20" font-weight="700" fill="#F0E4CC">40% reduction</text>
<text x="60" y="672" font-size="11" fill="#C9B896">in help desk tickets, emails, and Teams messages</text>
</g>

</svg>
