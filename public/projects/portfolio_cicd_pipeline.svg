<svg width="100%" viewBox="0 0 680 720" xmlns="http://www.w3.org/2000/svg" style="font-family: 'Space Grotesk', system-ui, -apple-system, sans-serif;">
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<!-- Diagram backdrop -->
<rect x="0" y="0" width="680" height="720" fill="#1E1715"/>

<!-- ═══════════════════════════════════════════
     1. Local Development (top) — deep crimson
     ═══════════════════════════════════════════ -->
<g>
<rect x="190" y="36" width="300" height="64" rx="8" fill="#3D1E1E" stroke="#A03333" stroke-width="0.75"/>
<text x="340" y="58" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#F5DCDC">Local Development</text>
<text x="340" y="80" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#C9A8A8">VS Code · React · Vite</text>
</g>

<!-- Arrow: Local → GitHub, with "git push" label -->
<line x1="340" y1="100" x2="340" y2="143" stroke="#7A6F5C" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="350" y="123" dominant-baseline="central" font-size="11" font-style="italic" fill="#A89484">git push</text>

<!-- ═══════════════════════════════════════════
     2. GitHub (Source Control) — warm bone/amber
     ═══════════════════════════════════════════ -->
<g>
<rect x="190" y="145" width="300" height="64" rx="8" fill="#3D3324" stroke="#B89A65" stroke-width="0.75"/>
<text x="340" y="167" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#F0E4CC">GitHub</text>
<text x="340" y="189" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#C9B896">main branch · source of truth</text>
</g>

<!-- Arrow: GitHub → Amplify, with "webhook" label -->
<line x1="340" y1="209" x2="340" y2="282" stroke="#7A6F5C" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="350" y="245" dominant-baseline="central" font-size="11" font-style="italic" fill="#A89484">webhook trigger</text>

<!-- ═══════════════════════════════════════════
     AWS Cloud container
     ═══════════════════════════════════════════ -->
<rect x="40" y="262" width="600" height="370" rx="16" fill="none" stroke="#5C5247" stroke-width="1" stroke-dasharray="6 4"/>
<text x="60" y="286" font-size="11" font-weight="500" letter-spacing="0.05em" fill="#7A6F5C">AWS CLOUD</text>

<!-- ═══════════════════════════════════════════
     3. AWS Amplify (Build Pipeline) — terracotta-rust
     ═══════════════════════════════════════════ -->
<g>
<rect x="130" y="300" width="420" height="120" rx="8" fill="#3D2820" stroke="#B86B4A" stroke-width="0.75"/>
<text x="340" y="324" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#F5DDD0">AWS Amplify · Build &amp; Deploy</text>

<!-- Build steps inside box -->
<line x1="155" y1="345" x2="525" y2="345" stroke="#5C3D30" stroke-width="0.5"/>

<text x="155" y="364" dominant-baseline="central" font-size="11" fill="#D2A892">▸ <tspan font-family="DM Mono, monospace" fill="#E8C5B0">npm ci</tspan> — install dependencies</text>
<text x="155" y="384" dominant-baseline="central" font-size="11" fill="#D2A892">▸ <tspan font-family="DM Mono, monospace" fill="#E8C5B0">npm run build</tspan> — Vite bundles to <tspan font-family="DM Mono, monospace" fill="#E8C5B0">dist/</tspan></text>
<text x="155" y="404" dominant-baseline="central" font-size="11" fill="#D2A892">▸ Atomic deploy on success — failed builds never ship</text>
</g>

<!-- Arrow: Amplify → CloudFront -->
<line x1="340" y1="420" x2="340" y2="463" stroke="#7A6F5C" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- ═══════════════════════════════════════════
     4. CloudFront + S3 — olive-sage
     ═══════════════════════════════════════════ -->
<g>
<rect x="130" y="465" width="420" height="64" rx="8" fill="#2A3528" stroke="#7A8A65" stroke-width="0.75"/>
<text x="340" y="487" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#DCE5D2">CloudFront + S3</text>
<text x="340" y="509" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#A8B89A">Global CDN · Auto-renewed SSL · Edge caching</text>
</g>

<!-- ═══════════════════════════════════════════
     5. Custom Domain (adjr.io) — dusty rose, inside cloud
     ═══════════════════════════════════════════ -->
<g>
<rect x="220" y="555" width="240" height="56" rx="8" fill="#3A2832" stroke="#6B4858" stroke-width="0.75"/>
<text x="340" y="575" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" font-family="DM Mono, monospace" fill="#E8D4DC">adjr.io</text>
<text x="340" y="595" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#B89AA5">Custom domain · Route 53 DNS</text>
</g>

<!-- Arrow: CloudFront → adjr.io -->
<line x1="340" y1="529" x2="340" y2="553" stroke="#7A6F5C" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Arrow: adjr.io → Visitor (exits cloud container) -->
<line x1="340" y1="611" x2="340" y2="654" stroke="#7A6F5C" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- ═══════════════════════════════════════════
     6. Visitor (bottom) — mint-sage
     ═══════════════════════════════════════════ -->
<g>
<rect x="190" y="656" width="300" height="56" rx="8" fill="#2D3530" stroke="#8AA88E" stroke-width="0.75"/>
<text x="340" y="676" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#D8E5DA">Visitor</text>
<text x="340" y="696" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#9AB89E">Browser · served from nearest edge</text>
</g>

</svg>
