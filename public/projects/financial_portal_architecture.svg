<svg width="100%" viewBox="0 0 680 560" xmlns="http://www.w3.org/2000/svg" style="font-family: 'Space Grotesk', system-ui, -apple-system, sans-serif;">
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<!-- Diagram backdrop — slightly lifted from the page background to read as a "panel" -->
<rect x="0" y="0" width="680" height="560" fill="#1E1715"/>

<!-- Subtle grain texture via pattern would be nice but skip for simplicity -->

<!-- Auth0 (external service, top right) — dusty rose-violet -->
<g>
<rect x="490" y="36" width="160" height="56" rx="8" fill="#3A2832" stroke="#6B4858" stroke-width="0.75"/>
<text x="570" y="56" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#E8D4DC">Auth0</text>
<text x="570" y="76" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#B89AA5">MFA, RBAC, SSO</text>
</g>

<!-- Client Browser — deep crimson (primary) -->
<g>
<rect x="130" y="36" width="300" height="56" rx="8" fill="#3D1E1E" stroke="#A03333" stroke-width="0.75"/>
<text x="280" y="56" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#F5DCDC">React SPA</text>
<text x="280" y="76" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#C9A8A8">TypeScript, Vite, Recharts</text>
</g>

<!-- Arrow: Client <-> Auth0 -->
<line x1="430" y1="64" x2="488" y2="64" stroke="#7A6F5C" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- AWS Cloud container -->
<rect x="40" y="140" width="600" height="390" rx="16" fill="none" stroke="#5C5247" stroke-width="1" stroke-dasharray="6 4"/>
<text x="60" y="164" font-size="11" font-weight="500" letter-spacing="0.05em" fill="#7A6F5C">AWS CLOUD</text>

<!-- CloudFront + S3 Static — olive-sage -->
<g>
<rect x="130" y="185" width="300" height="56" rx="8" fill="#2A3528" stroke="#7A8A65" stroke-width="0.75"/>
<text x="280" y="205" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#DCE5D2">CloudFront + S3</text>
<text x="280" y="225" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#A8B89A">Static hosting, CDN</text>
</g>

<!-- Arrow: Client -> CloudFront -->
<line x1="280" y1="92" x2="280" y2="183" stroke="#7A6F5C" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- FastAPI Backend — terracotta-rust -->
<g>
<rect x="130" y="300" width="300" height="56" rx="8" fill="#3D2820" stroke="#B86B4A" stroke-width="0.75"/>
<text x="280" y="320" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#F5DDD0">FastAPI Backend</text>
<text x="280" y="340" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#D2A892">ECS Fargate, SQLAlchemy</text>
</g>

<!-- Arrow: CloudFront -> FastAPI -->
<line x1="280" y1="241" x2="280" y2="298" stroke="#7A6F5C" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Arrow: Auth0 -> FastAPI (JWT validation, L-shaped path) -->
<path d="M 570 92 L 570 328 L 432 328" fill="none" stroke="#7A6F5C" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="576" y="210" dominant-baseline="central" font-size="11" font-style="italic" fill="#A89484">JWT validation</text>

<!-- PostgreSQL — warm bone/amber -->
<g>
<rect x="60" y="430" width="260" height="56" rx="8" fill="#3D3324" stroke="#B89A65" stroke-width="0.75"/>
<text x="190" y="450" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#F0E4CC">PostgreSQL (RDS)</text>
<text x="190" y="470" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#C9B896">Encrypted, row-level security</text>
</g>

<!-- S3 File Storage — sage-mint (lighter than CloudFront) -->
<g>
<rect x="370" y="430" width="250" height="56" rx="8" fill="#2D3530" stroke="#8AA88E" stroke-width="0.75"/>
<text x="495" y="450" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="600" fill="#D8E5DA">S3 Bucket</text>
<text x="495" y="470" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#9AB89E">Reports, exports, backups</text>
</g>

<!-- Arrow: FastAPI -> PostgreSQL -->
<line x1="220" y1="356" x2="190" y2="428" stroke="#7A6F5C" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Arrow: FastAPI -> S3 -->
<line x1="340" y1="356" x2="450" y2="428" stroke="#7A6F5C" stroke-width="1.5" marker-end="url(#arrow)"/>

</svg>
